groups:
  - name: agrivo-backend
    rules:
      - alert: AgrivoBackendDown
        expr: up{job="agrivo-backend"} == 0
        for: 2m
        labels:
          severity: critical
          service: agrivo-backend
        annotations:
          summary: Agrivo backend metrics endpoint is down
      - alert: AgrivoBackendHighErrorRate
        expr: 100 * sum(rate(agrivo_backend_http_requests_total{status_code=~"5.."}[5m])) / clamp_min(sum(rate(agrivo_backend_http_requests_total[5m])), 0.001) > 5
        for: 5m
        labels:
          severity: warning
          service: agrivo-backend
        annotations:
          summary: Backend 5xx rate is above 5 percent
      - alert: AgrivoBackendHighLatency
        expr: 1000 * histogram_quantile(0.95, sum by (le) (rate(agrivo_backend_http_request_duration_seconds_bucket[5m]))) > 1000
        for: 5m
        labels:
          severity: warning
          service: agrivo-backend
        annotations:
          summary: Backend p95 latency is above one second
